  <rect x="10" y="198" width="960" height="1136" rx="6" fill="#ffffff" stroke="#d9dee6"/>
  <text x="35" y="243" fill="#00122a" font-family="Arial, sans-serif" font-size="20" font-weight="700">WebMCP</text>
  <line x1="10" y1="275" x2="970" y2="275" stroke="#d9dee6"/>

  <text x="35" y="309" fill="#00122a" font-family="Arial, sans-serif" font-size="14">Sales Channel</text>
  <rect x="35" y="319" width="910" height="48" rx="4" fill="#ffffff" stroke="#c7ced6"/>
  <text x="52" y="348" fill="#00122a" font-family="Arial, sans-serif" font-size="14">All Sales Channels</text>
