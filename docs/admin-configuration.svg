<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1347" viewBox="0 0 980 1347" role="img" aria-labelledby="title desc">
  <title id="title">Shopware Admin WebMCP configuration screen</title>
  <desc id="desc">The Shopware Admin plugin configuration screen for WebMCP, showing sales channel selection, the main WebMCP enable toggle, context and static elements JSON fields, and individual tool toggles.</desc>
