  <rect x="16" y="58" width="60" height="60" rx="3" fill="#f1f3f5"/>
  <rect x="19" y="61" width="18" height="8" fill="#dfe4ea"/>
  <rect x="41" y="61" width="31" height="8" fill="#dfe4ea"/>
  <rect x="19" y="73" width="31" height="19" fill="#ffffff"/>
  <rect x="54" y="73" width="18" height="19" fill="#ffffff"/>
  <rect x="19" y="96" width="53" height="18" fill="#ffffff"/>
